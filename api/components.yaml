components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum

  parameters:
    ApartmentId:
      name: id
      in: path
      required: true
      schema:
        type: integer
    ApartmentHeader:
      name: apartment
      in: header
      required: true
      schema:
        type: integer
      description: Managed apartment id used for apartment user operations

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'

  schemas:
    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
      required: [message]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
      required: [name, email, password]

    UpdateCurrentUserRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string

    StoreApartmentRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        is_default:
          type: boolean
      required: [name]

    UpdateApartmentRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        is_default:
          type: boolean

    AddApartmentUserRequest:
      type: object
      properties:
        user_id:
          type: integer
        role:
          type: string
      required: [user_id]

    VerifyEmailCodeRequest:
      type: object
      properties:
        code:
          type: string
      required: [code]

    AuthTokenResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'
      required: [token, user]

    VerifyEmailCodeResponse:
      type: object
      properties:
        message:
          type: string
        user:
          $ref: '#/components/schemas/User'
      required: [message, user]

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        emailVerifiedAt:
          type: string
          format: date-time
          nullable: true
        phoneVerifiedAt:
          type: string
          format: date-time
          nullable: true

    CurrentUserResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        emailVerifiedAt:
          type: string
          format: date-time
          nullable: true
        phoneVerifiedAt:
          type: string
          format: date-time
          nullable: true
        emailVerification:
          type: boolean
        emailVerificationLocked:
          type: boolean
        phoneVerification:
          type: boolean
        phoneVerificationLocked:
          type: boolean
      required:
        - id
        - name
        - email
        - emailVerification
        - emailVerificationLocked
        - phoneVerification
        - phoneVerificationLocked

    Apartment:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        isDefault:
          type: boolean
        ownerId:
          type: integer
      required: [id, name, isDefault, ownerId]

    RelatedApartment:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        isDefault:
          type: boolean
        ownerId:
          type: integer
        isOwner:
          type: boolean
        role:
          type: string
      required: [id, name, isDefault, ownerId, isOwner, role]

    ApartmentUserLookupResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        alreadyInApartment:
          type: boolean
      required: [user, alreadyInApartment]

    ApartmentUserMembership:
      type: object
      properties:
        id:
          type: integer
        apartmentId:
          type: integer
        userId:
          type: integer
        role:
          type: string
      required: [id, apartmentId, userId, role]

    ApartmentUsersResponse:
      type: object
      properties:
        users:
          type: array
          items:
            type: object
            properties:
              membershipId:
                type: integer
              role:
                type: string
              user:
                $ref: '#/components/schemas/User'
            required: [membershipId, role, user]
      required: [users]

    Category:
      type: object
      properties:
        id:
          type: integer
        apartmentId:
          type: integer
        name:
          type: string
      required: [id, apartmentId, name]

    StoreCategoryRequest:
      type: object
      properties:
        name:
          type: string
      required: [name]

    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string

    CategoriesResponse:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: '#/components/schemas/Category'
      required: [categories]

    CategoryResponse:
      type: object
      properties:
        category:
          $ref: '#/components/schemas/Category'
      required: [category]

    Department:
      type: object
      properties:
        id:
          type: integer
        apartmentId:
          type: integer
        name:
          type: string
      required: [id, apartmentId, name]

    StoreDepartmentRequest:
      type: object
      properties:
        name:
          type: string
      required: [name]

    UpdateDepartmentRequest:
      type: object
      properties:
        name:
          type: string

    DepartmentsResponse:
      type: object
      properties:
        departments:
          type: array
          items:
            $ref: '#/components/schemas/Department'
      required: [departments]

    DepartmentResponse:
      type: object
      properties:
        department:
          $ref: '#/components/schemas/Department'
      required: [department]

    Product:
      type: object
      properties:
        id:
          type: integer
        apartmentId:
          type: integer
        name:
          type: string
        importance:
          type: integer
        categoryId:
          type: integer
          nullable: true
        departmentId:
          type: integer
          nullable: true
        description:
          type: string
          nullable: true
      required: [id, apartmentId, name, importance]

    StoreProductRequest:
      type: object
      properties:
        name:
          type: string
        importance:
          type: integer
          minimum: 0
          maximum: 10
        categoryId:
          type: integer
          nullable: true
        departmentId:
          type: integer
          nullable: true
        description:
          type: string
          nullable: true
      required: [name, importance]

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
        importance:
          type: integer
          minimum: 0
          maximum: 10
        categoryId:
          type: integer
          nullable: true
        departmentId:
          type: integer
          nullable: true
        description:
          type: string
          nullable: true

    ProductsResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'
      required: [products]

    ProductResponse:
      type: object
      properties:
        product:
          $ref: '#/components/schemas/Product'
      required: [product]

    Acquisition:
      type: object
      properties:
        id:
          type: integer
        apartmentId:
          type: integer
        storeName:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, complete, cancelled]
        userId:
          type: integer
      required: [id, apartmentId, storeName, status, userId]

    StoreAcquisitionRequest:
      type: object
      properties:
        storeName:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, complete]
          nullable: true
      required: [storeName]

    UpdateAcquisitionRequest:
      type: object
      properties:
        storeName:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, complete, cancelled]

    AcquisitionsResponse:
      type: object
      properties:
        acquisitions:
          type: array
          items:
            $ref: '#/components/schemas/Acquisition'
      required: [acquisitions]

    AcquisitionResponse:
      type: object
      properties:
        acquisition:
          $ref: '#/components/schemas/Acquisition'
      required: [acquisition]

    AcquisitionItem:
      type: object
      properties:
        id:
          type: integer
        acquisitionId:
          type: integer
        productId:
          type: integer
          nullable: true
        productName:
          type: string
        description:
          type: string
          nullable: true
        expirationDate:
          type: string
          format: date-time
          nullable: true
        quantity:
          type: number
        price:
          type: number
        total:
          type: number
      required: [id, acquisitionId, productName, quantity, price, total]

    StoreAcquisitionItemRequest:
      type: object
      properties:
        productId:
          type: integer
          nullable: true
        productName:
          type: string
        description:
          type: string
          nullable: true
        expirationDate:
          type: string
          format: date-time
          nullable: true
        quantity:
          type: number
        price:
          type: number
      required: [productName, quantity, price]

    UpdateAcquisitionItemRequest:
      type: object
      properties:
        productId:
          type: integer
          nullable: true
        productName:
          type: string
        description:
          type: string
          nullable: true
        expirationDate:
          type: string
          format: date-time
          nullable: true
        quantity:
          type: number
        price:
          type: number

    AcquisitionItemsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AcquisitionItem'
      required: [items]

    AcquisitionItemResponse:
      type: object
      properties:
        item:
          $ref: '#/components/schemas/AcquisitionItem'
      required: [item]

    StockProduct:
      type: object
      properties:
        id:
          type: integer
        apartmentId:
          type: integer
        itemId:
          type: integer
        productName:
          type: string
        quantity:
          type: number
        quantityUsed:
          type: number
        expirationDate:
          type: string
          format: date-time
      required: [id, apartmentId, itemId, productName, quantity, quantityUsed, expirationDate]

    StoreStockProductRequest:
      type: object
      properties:
        itemId:
          type: integer
        productName:
          type: string
        quantity:
          type: number
        quantityUsed:
          type: number
        expirationDate:
          type: string
          format: date-time
      required: [itemId, productName, quantity, quantityUsed, expirationDate]

    UpdateStockProductRequest:
      type: object
      properties:
        itemId:
          type: integer
        productName:
          type: string
        quantity:
          type: number
        quantityUsed:
          type: number
        expirationDate:
          type: string
          format: date-time

    StockProductsResponse:
      type: object
      properties:
        stockProducts:
          type: array
          items:
            $ref: '#/components/schemas/StockProduct'
      required: [stockProducts]

    StockProductResponse:
      type: object
      properties:
        stockProduct:
          $ref: '#/components/schemas/StockProduct'
      required: [stockProduct]

    ArchivedAcquisitionItem:
      type: object
      properties:
        id:
          type: integer
        apartmentId:
          type: integer
        itemId:
          type: integer
        productName:
          type: string
        quantity:
          type: number
        quantityUsed:
          type: number
        expirationDate:
          type: string
          format: date-time
        archiveDate:
          type: string
          format: date-time
      required: [id, apartmentId, itemId, productName, quantity, quantityUsed, expirationDate, archiveDate]

    StoreArchivedAcquisitionItemRequest:
      type: object
      properties:
        itemId:
          type: integer
        productName:
          type: string
        quantity:
          type: number
        quantityUsed:
          type: number
        expirationDate:
          type: string
          format: date-time
        archiveDate:
          type: string
          format: date-time
      required: [itemId, productName, quantity, quantityUsed, expirationDate, archiveDate]

    UpdateArchivedAcquisitionItemRequest:
      type: object
      properties:
        itemId:
          type: integer
        productName:
          type: string
        quantity:
          type: number
        quantityUsed:
          type: number
        expirationDate:
          type: string
          format: date-time
        archiveDate:
          type: string
          format: date-time

    ArchivedAcquisitionItemsResponse:
      type: object
      properties:
        archivedItems:
          type: array
          items:
            $ref: '#/components/schemas/ArchivedAcquisitionItem'
      required: [archivedItems]

    ArchivedAcquisitionItemResponse:
      type: object
      properties:
        archivedItem:
          $ref: '#/components/schemas/ArchivedAcquisitionItem'
      required: [archivedItem]

