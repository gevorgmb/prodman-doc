paths:
  /archived-acquisition-items:
    get:
      summary: List all archived acquisition items
      tags: [Archived Acquisition Items]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../components.yaml#/components/parameters/ApartmentHeader'
      responses:
        200:
          description: A list of archived acquisition items
          content:
            application/json:
              schema:
                $ref: '../components.yaml#/components/schemas/ArchivedAcquisitionItemsResponse'
        422:
          $ref: '../components.yaml#/components/responses/ValidationError'



  /archived-acquisition-items/{id}:
    get:
      summary: Get archived acquisition item by id
      tags: [Archived Acquisition Items]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../components.yaml#/components/parameters/ApartmentHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Archived acquisition item found
          content:
            application/json:
              schema:
                $ref: '../components.yaml#/components/schemas/ArchivedAcquisitionItemResponse'
        404:
          $ref: '../components.yaml#/components/responses/NotFound'


