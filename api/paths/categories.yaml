paths:
  /categories:
    get:
      summary: List all categories
      tags: [Categories]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../components.yaml#/components/parameters/ApartmentHeader'
      responses:
        200:
          description: A list of categories
          content:
            application/json:
              schema:
                $ref: '../components.yaml#/components/schemas/CategoriesResponse'
        422:
          $ref: '../components.yaml#/components/responses/ValidationError'

    post:
      summary: Create a new category
      tags: [Categories]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../components.yaml#/components/parameters/ApartmentHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/StoreCategoryRequest'
      responses:
        201:
          description: Category created
          content:
            application/json:
              schema:
                $ref: '../components.yaml#/components/schemas/CategoryResponse'
        422:
          $ref: '../components.yaml#/components/responses/ValidationError'

  /categories/{id}:
    get:
      summary: Get category by id
      tags: [Categories]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../components.yaml#/components/parameters/ApartmentHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Category found
          content:
            application/json:
              schema:
                $ref: '../components.yaml#/components/schemas/CategoryResponse'
        404:
          $ref: '../components.yaml#/components/responses/NotFound'

    patch:
      summary: Update a category
      tags: [Categories]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../components.yaml#/components/parameters/ApartmentHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/UpdateCategoryRequest'
      responses:
        200:
          description: Category updated
          content:
            application/json:
              schema:
                $ref: '../components.yaml#/components/schemas/CategoryResponse'
        404:
          $ref: '../components.yaml#/components/responses/NotFound'
        422:
          $ref: '../components.yaml#/components/responses/ValidationError'

    delete:
      summary: Delete a category
      tags: [Categories]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../components.yaml#/components/parameters/ApartmentHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        204:
          description: Category deleted
        404:
          $ref: '../components.yaml#/components/responses/NotFound'
