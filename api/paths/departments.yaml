paths:
  /departments:
    get:
      summary: List all departments
      tags: [Departments]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../components.yaml#/components/parameters/ApartmentHeader'
      responses:
        200:
          description: A list of departments
          content:
            application/json:
              schema:
                $ref: '../components.yaml#/components/schemas/DepartmentsResponse'
        422:
          $ref: '../components.yaml#/components/responses/ValidationError'

    post:
      summary: Create a new department
      tags: [Departments]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../components.yaml#/components/parameters/ApartmentHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/StoreDepartmentRequest'
      responses:
        201:
          description: Department created
          content:
            application/json:
              schema:
                $ref: '../components.yaml#/components/schemas/DepartmentResponse'
        422:
          $ref: '../components.yaml#/components/responses/ValidationError'

  /departments/{id}:
    get:
      summary: Get department by id
      tags: [Departments]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../components.yaml#/components/parameters/ApartmentHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Department found
          content:
            application/json:
              schema:
                $ref: '../components.yaml#/components/schemas/DepartmentResponse'
        404:
          $ref: '../components.yaml#/components/responses/NotFound'

    patch:
      summary: Update a department
      tags: [Departments]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../components.yaml#/components/parameters/ApartmentHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/UpdateDepartmentRequest'
      responses:
        200:
          description: Department updated
          content:
            application/json:
              schema:
                $ref: '../components.yaml#/components/schemas/DepartmentResponse'
        404:
          $ref: '../components.yaml#/components/responses/NotFound'
        422:
          $ref: '../components.yaml#/components/responses/ValidationError'

    delete:
      summary: Delete a department
      tags: [Departments]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../components.yaml#/components/parameters/ApartmentHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        204:
          description: Department deleted
        404:
          $ref: '../components.yaml#/components/responses/NotFound'
