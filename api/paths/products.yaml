paths:
  /products:
    get:
      summary: List all products
      tags: [Products]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../components.yaml#/components/parameters/ApartmentHeader'
      responses:
        200:
          description: A list of products
          content:
            application/json:
              schema:
                $ref: '../components.yaml#/components/schemas/ProductsResponse'
        422:
          $ref: '../components.yaml#/components/responses/ValidationError'

    post:
      summary: Create a new product
      tags: [Products]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../components.yaml#/components/parameters/ApartmentHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/StoreProductRequest'
      responses:
        201:
          description: Product created
          content:
            application/json:
              schema:
                $ref: '../components.yaml#/components/schemas/ProductResponse'
        422:
          $ref: '../components.yaml#/components/responses/ValidationError'

  /products/{id}:
    get:
      summary: Get product by id
      tags: [Products]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../components.yaml#/components/parameters/ApartmentHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Product found
          content:
            application/json:
              schema:
                $ref: '../components.yaml#/components/schemas/ProductResponse'
        404:
          $ref: '../components.yaml#/components/responses/NotFound'

    patch:
      summary: Update a product
      tags: [Products]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../components.yaml#/components/parameters/ApartmentHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/UpdateProductRequest'
      responses:
        200:
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '../components.yaml#/components/schemas/ProductResponse'
        404:
          $ref: '../components.yaml#/components/responses/NotFound'
        422:
          $ref: '../components.yaml#/components/responses/ValidationError'

    delete:
      summary: Delete a product
      tags: [Products]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../components.yaml#/components/parameters/ApartmentHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        204:
          description: Product deleted
        404:
          $ref: '../components.yaml#/components/responses/NotFound'
