paths:
  /stock-products:
    get:
      summary: List all stock products
      tags: [Stock Products]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../components.yaml#/components/parameters/ApartmentHeader'
      responses:
        200:
          description: A list of stock products
          content:
            application/json:
              schema:
                $ref: '../components.yaml#/components/schemas/StockProductsResponse'
        422:
          $ref: '../components.yaml#/components/responses/ValidationError'



  /stock-products/{id}:
    get:
      summary: Get stock product by id
      tags: [Stock Products]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../components.yaml#/components/parameters/ApartmentHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Stock product found
          content:
            application/json:
              schema:
                $ref: '../components.yaml#/components/schemas/StockProductResponse'
        404:
          $ref: '../components.yaml#/components/responses/NotFound'

    patch:
      summary: Update a stock product
      tags: [Stock Products]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../components.yaml#/components/parameters/ApartmentHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/UpdateStockProductRequest'
      responses:
        200:
          description: Stock product updated
          content:
            application/json:
              schema:
                $ref: '../components.yaml#/components/schemas/StockProductResponse'
        404:
          $ref: '../components.yaml#/components/responses/NotFound'
        422:
          $ref: '../components.yaml#/components/responses/ValidationError'


